335|        function escapeHtml(s) {
336|            if (!s) return '';
337|            return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
338|        }

340|        function renderBio() {
341|            const D = bioData;
342|
343|            // --- Hero ---
344|            document.getElementById('bioAvatar').src = D.avatar || 'https://q1.qlogo.cn/g?b=qq&nk=YOUR_QQ_NUMBER&s=640';
