<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>xiong da</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(25, 25, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --theme-accent: #a5b4fc;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: url('https://api.suyanw.cn/api/comic3.php') center/cover fixed no-repeat;
            color: var(--text-main); padding: 20px; overflow-x: hidden;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        .layout-container {
            position: relative; z-index: 10;
            display: grid; grid-template-columns: 320px 480px; gap: 25px;
            width: 100%; max-width: 840px;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--glass-border); border-radius: 24px;
            box-shadow: var(--glass-shadow); position: relative;
        }

        /* === 左侧：个人资料卡片 === */
        .profile-card { padding: 60px 30px 30px 30px; text-align: center; display: flex; flex-direction: column; }

        .avatar-wrap {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px; border-radius: 50%; padding: 4px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.5s;
        }
        .avatar-wrap:hover { transform: translateX(-50%) rotate(360deg); }
        .avatar {
            width: 100%; height: 100%; border-radius: 50%;
            background: #2a2a35 url('https://via.placeholder.com/640x640/2a2a35/ffffff?text=Avatar') center/cover;
        }

        .name { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }

        .hitokoto-box { min-height: 45px; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 25px; line-height: 1.6; }
        .cursor {
            display: inline-block; width: 2px; height: 1em; vertical-align: -0.15em;
            background-color: var(--text-main); animation: blink 1s step-end infinite; margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn-group { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .link-btn {
            display: flex; align-items: center; padding: 12px 20px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); text-decoration: none; transition: all 0.3s; cursor: pointer;
        }
        .link-btn .icon-box {
            width: 32px; height: 32px; border-radius: 50%; background: rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center; margin-right: 15px; transition: all 0.3s;
        }
        .link-btn .text { flex: 1; text-align: left; font-size: 0.95rem; font-weight: 500; }
        .link-btn .arrow { font-size: 0.8rem; color: var(--text-muted); transition: all 0.3s; }
        
        .link-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
        .link-btn.github:hover { border-color: rgba(255, 255, 255, 0.6); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .link-btn.qq:hover { border-color: #12b7f5; box-shadow: 0 0 15px rgba(18, 183, 245, 0.3); }
        .link-btn.qq:hover .icon-box { color: #12b7f5; }
        .link-btn.wechat:hover { border-color: #07c160; box-shadow: 0 0 15px rgba(7, 193, 96, 0.3); }
        .link-btn.wechat:hover .icon-box { color: #07c160; }
        .link-btn:hover .arrow { transform: translateX(5px); color: var(--text-main); }

        /* === 右侧：工具与音乐卡片 === */
        .tools-card { padding: 30px; display: flex; flex-direction: column; gap: 20px; }

        .clock-area { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .clock-time { font-size: 3.5rem; font-weight: 700; line-height: 1; letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 5px; }
        .clock-date { font-size: 0.95rem; color: var(--text-muted); }

        /* 天气小组件 */
        .weather-widget {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            padding: 15px; margin-top: 15px;
            background: rgba(255,255,255,0.05); border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .weather-widget:hover { background: rgba(255,255,255,0.1); }
        .weather-icon { font-size: 2.5rem; color: var(--theme-accent); }
        .weather-info { text-align: left; }
        .weather-temp { font-size: 1.8rem; font-weight: 700; line-height: 1; }
        .weather-desc { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
        .weather-city { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .weather-loading { color: var(--text-muted); font-size: 0.9rem; }

        /* 音乐律动效果 */
        body.music-pulse .overlay {
            transition: background 0.1s ease-out;
        }
        body.music-pulse .glass-card {
            transition: box-shadow 0.1s ease-out, transform 0.1s ease-out;
        }

        /* 点击特效 */
        .click-effect {
            position: fixed; pointer-events: none; z-index: 9999;
            border-radius: 50%;
            animation: clickRipple 0.6s ease-out forwards;
        }
        @keyframes clickRipple {
            0% { width: 0; height: 0; opacity: 0.5; border: 2px solid var(--theme-accent); }
            100% { width: 100px; height: 100px; opacity: 0; border: 2px solid transparent; }
        }
        .click-heart {
            position: fixed; pointer-events: none; z-index: 9999;
            font-size: 20px; color: #ff6b9d;
            animation: heartFloat 1.2s ease-out forwards;
        }
        @keyframes heartFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
        }
        .click-particle {
            position: fixed; pointer-events: none; z-index: 9999;
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--theme-accent);
            animation: particleExplode 0.8s ease-out forwards;
        }
        @keyframes particleExplode {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* 手搓定制拟态播放器 */
        .custom-player {
            display: flex; align-items: center; gap: 15px;
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 15px; box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
        }

        .vinyl-record {
            width: 75px; height: 75px; border-radius: 50%;
            background: #111; border: 2px solid rgba(255,255,255,0.15);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            animation: spin 5s linear infinite;
            animation-play-state: paused;
        }
        .vinyl-record.playing { animation-play-state: running; }
        .vinyl-record::after {
            content: ''; position: absolute;
            width: 14px; height: 14px; background: #222;
            border-radius: 50%; border: 1px solid rgba(0,0,0,0.8);
        }
        .album-cover {
            width: 50px; height: 50px; border-radius: 50%;
            object-fit: cover; z-index: 0; background-color: #333;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .player-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .player-title { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .player-artist { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .progress-bar-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; margin-bottom: 10px; cursor: pointer; position: relative;
        }
        .progress-fill {
            height: 100%; width: 0%; background: var(--theme-accent);
            border-radius: 2px; transition: width 0.1s linear; position: relative;
        }
        .progress-fill::after {
            content: ''; position: absolute; right: -4px; top: -3px;
            width: 10px; height: 10px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s;
        }
        .progress-bar-container:hover .progress-fill::after { opacity: 1; }

        .player-controls { display: flex; align-items: center; gap: 15px; }
        .control-btn {
            background: none; border: none; color: var(--text-main);
            font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
        }
        .control-btn:hover { color: var(--theme-accent); transform: scale(1.1); }
        .control-btn.play-pause {
            width: 35px; height: 35px; border-radius: 50%;
            background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center;
        }
        .control-btn.play-pause:hover { background: rgba(255,255,255,0.2); }

        .search-box { display: flex; gap: 10px; }
        .search-box input {
            flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 10px 15px; border-radius: 12px; outline: none; transition: all 0.3s;
        }
        .search-box input:focus { border-color: var(--theme-accent); background: rgba(255, 255, 255, 0.15); }
        
        .action-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .action-btns button {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff; padding: 8px; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 0.85rem;
        }
        .action-btns button:hover { background: rgba(255, 255, 255, 0.2); }

        .music-list {
            flex: 1; background: rgba(0, 0, 0, 0.2); border-radius: 12px; padding: 10px;
            overflow-y: auto; max-height: 180px; border: 1px solid rgba(255,255,255,0.05);
        }
        .music-list::-webkit-scrollbar { width: 6px; }
        .music-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .music-item {
            display: flex; align-items: center; padding: 10px; border-radius: 8px; cursor: pointer;
            transition: background 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .music-item.active { background: rgba(165, 180, 252, 0.15); border-color: var(--theme-accent); }
        .music-item:hover { background: rgba(255, 255, 255, 0.1); }
        .music-item .play-icon { width: 30px; color: var(--theme-accent); font-size: 0.9rem; }
        .music-item .music-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .music-item .music-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .music-item .music-artist { font-size: 0.75rem; color: var(--text-muted); }
        .music-item .music-duration { font-size: 0.75rem; color: var(--text-muted); margin-right: 12px; font-family: monospace; }
        .music-item .source-tag { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 50px; white-space: nowrap; }

        .status-msg { text-align: center; padding: 20px; font-size: 0.9rem; color: var(--text-muted); }

        /* 终端日志弹窗样式 */
        #log-trigger-btn {
            position: fixed; bottom: 20px; left: 20px;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15); color: #fff;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 1000; transition: all 0.3s;
        }
        #log-trigger-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        
        #log-panel {
            position: fixed; bottom: 80px; left: 20px; width: 400px; height: 450px;
            background: rgba(10, 10, 15, 0.85); display: none; flex-direction: column;
            z-index: 1000; padding: 0; overflow: hidden; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
        }
        #log-panel.show { display: flex; animation: slideUpFade 0.3s forwards; }
        .log-header {
            padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9rem; font-weight: 500; background: rgba(0,0,0,0.3);
        }
        #log-content { flex: 1; padding: 15px; overflow-y: auto; font-family: monospace; }
        .log-item { margin-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 10px; }
        .log-time { color: #a5b4fc; font-size: 0.75rem; margin-bottom: 4px; }
        .log-title { color: #4ade80; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; }
        .log-data { color: #d1d5db; font-size: 0.75rem; white-space: pre-wrap; word-break: break-all; margin:0; }
        .log-error { color: #ff4757; font-size: 0.75rem; white-space: pre-wrap; word-break: break-all; margin:0; }

        #toast {
            position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15); padding: 12px 24px; border-radius: 50px;
            font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: top 0.4s ease; z-index: 9999; display: flex; align-items: center; gap: 10px;
        }
        #toast.show { top: 30px; }

        /* === 歌词面板 === */
        #lyric-trigger-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
            padding: 4px 8px; border-radius: 8px;
        }
        #lyric-trigger-btn:hover { color: var(--theme-accent); background: rgba(255,255,255,0.1); }
        #lyric-trigger-btn.active { color: var(--theme-accent); }

        #lyric-panel {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s ease, border-width 0.4s ease;
            background: rgba(0, 0, 0, 0.25); border-radius: 16px;
            border: 0px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        #lyric-panel.show {
            max-height: 280px; padding: 15px;
            border-width: 1px;
        }

        .lyric-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; font-size: 0.85rem; color: var(--text-muted);
        }
        .lyric-header i { margin-right: 5px; }

        #lyric-content {
            max-height: 220px; overflow-y: auto; text-align: center;
            scroll-behavior: smooth; padding: 30px 0;
        }
        #lyric-content::-webkit-scrollbar { width: 4px; }
        #lyric-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .lyric-line {
            padding: 6px 10px; font-size: 0.85rem; color: rgba(255,255,255,0.4);
            transition: all 0.3s ease; cursor: pointer; line-height: 1.5;
        }
        .lyric-line:hover { color: rgba(255,255,255,0.7); }
        .lyric-line.active {
            color: var(--theme-accent); font-size: 1rem; font-weight: 600;
            text-shadow: 0 0 10px rgba(165, 180, 252, 0.5);
        }
        .lyric-line.past { color: rgba(255,255,255,0.55); }

        .lyric-empty {
            text-align: center; padding: 30px; font-size: 0.85rem; color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .layout-container { grid-template-columns: 1fr; gap: 40px; }
            .profile-card { padding-top: 50px; }
            .tools-card { padding: 20px; }
            #log-panel { width: 90%; left: 5%; bottom: 80px; }
        }

        /* === 底部作者标注 === */
        .author-credit {
            text-align: center; padding: 15px 30px; font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin-top: 30px;
            background: rgba(25, 25, 30, 0.45);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            position: relative; z-index: 10;
        }
        .author-credit p { margin: 2px 0; }
        .author-credit a {
            color: rgba(255,255,255,0.7); text-decoration: none;
            transition: color 0.3s; cursor: pointer;
        }
        .author-credit a:hover { color: #a5b4fc; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <button id="log-trigger-btn" title="查看 API 响应日志" onclick="toggleLogPanel()"><i class="fas fa-terminal"></i></button>

    <div id="log-panel">
        <div class="log-header">
            <span><i class="fas fa-network-wired"></i> 接口响应日志终端</span>
            <i class="fas fa-times" style="cursor:pointer; color: #ff4757;" onclick="toggleLogPanel()"></i>
        </div>
        <div id="log-content"></div>
    </div>

    <div class="layout-container">
        <!-- 左侧：个人名片 -->
        <div class="glass-card profile-card">
            <div class="avatar-wrap"><div class="avatar"></div></div>
            <h1 class="name">xiong da</h1>
            
            <div class="hitokoto-box">
                <span id="typed-text"></span><span class="cursor"></span>
            </div>

            <div class="btn-group">
                <a href="https://github.com/kssssxg" target="_blank" class="link-btn github">
                    <div class="icon-box"><i class="fab fa-github"></i></div>
                    <span class="text">代码仓库</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </a>
                <div class="link-btn qq" onclick="openApp('qq', 'YOUR_QQ_NUMBER')">
                    <div class="icon-box"><i class="fab fa-qq"></i></div>
                    <span class="text">QQ 交流</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
                <div class="link-btn wechat" onclick="openApp('wechat', 'YOUR_WECHAT_ID')">
                    <div class="icon-box"><i class="fab fa-weixin"></i></div>
                    <span class="text">微信联系</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
                <a href="mailto:your.email@example.com" class="link-btn github">
                    <div class="icon-box"><i class="fas fa-envelope"></i></div>
                    <span class="text">发送邮件</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </a>
            </div>
        </div>

        <!-- 右侧：时钟与音乐中心 -->
        <div class="glass-card tools-card">
            <div class="clock-area">
                <div class="clock-time" id="clock-time">00:00:00</div>
                <div class="clock-date" id="clock-date">加载中...</div>
                <div class="weather-widget" id="weather-widget">
                    <div class="weather-loading"><i class="fas fa-spinner fa-spin"></i> 正在获取天气...</div>
                </div>
            </div>

            <div class="custom-player">
                <div class="vinyl-record" id="vinyl-record">
                    <img src="https://via.placeholder.com/640x640/333/ffffff?text=Cover" id="player-cover" class="album-cover" alt="cover">
                </div>
                <div class="player-info">
                    <div class="player-title" id="player-title">等待播放</div>
                    <div class="player-artist" id="player-artist">xiong da播放器</div>
                    
                    <div class="progress-bar-container" id="progress-container" onclick="seekAudio(event)">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>

                    <div class="player-controls">
                        <button class="control-btn" onclick="playPrev()" title="上一首"><i class="fas fa-step-backward"></i></button>
                        <button class="control-btn play-pause" onclick="togglePlay()" title="播放/暂停"><i class="fas fa-play" id="play-pause-icon"></i></button>
                        <button class="control-btn" onclick="playNext()" title="下一首"><i class="fas fa-step-forward"></i></button>
                        <span id="player-source-tag" style="font-size:0.7rem; color:var(--text-muted); margin-left:auto; border:1px solid rgba(255,255,255,0.2); padding:2px 6px; border-radius:4px;">未连接</span>
                        <button id="lyric-trigger-btn" title="歌词" onclick="toggleLyricPanel()"><i class="fas fa-microphone-alt"></i> 词</button>
                    </div>
                </div>
            </div>

            <div id="lyric-panel">
                <div class="lyric-header">
                    <span><i class="fas fa-music"></i> 歌词</span>
                    <span id="lyric-source-info"></span>
                </div>
                <div id="lyric-content">
                    <div class="lyric-empty">暂无歌词</div>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="musicKeyword" placeholder="输入歌名或歌手寻找乐曲...">
            </div>

    <script>
        // ================= 日志系统 =================
        function toggleLogPanel() {
            const panel = document.getElementById('log-panel');
            panel.classList.contains('show') ? panel.classList.remove('show') : panel.classList.add('show');
        }

        function printLog(title, data, isError = false) {
            if(isError) console.error(`[${title}]`, data);
            else console.log(`%c[${title}]`, 'color: #a5b4fc; font-weight: bold;', data);

            const contentDiv = document.getElementById('log-content');
            if(!contentDiv) return;

            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const div = document.createElement('div'); div.className = 'log-item';
            
            let dataStr = '';
            if(typeof data === 'object') {
                try { dataStr = JSON.stringify(data, null, 2); } catch(e) { dataStr = String(data); }
            } else dataStr = String(data);

            const dataClass = isError ? 'log-error' : 'log-data';
            div.innerHTML = `
                <div class="log-time">[${time}]</div>
                <div class="log-title">${title}</div>
                <pre class="${dataClass}">${escapeHtml(dataStr)}</pre>
            `;
            contentDiv.prepend(div);
        }

        function escapeHtml(str){ if(!str) return ''; return String(str).replace(/[&<>]/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }

        // ================= 工具函数 =================
        function formatTime(sec) {
            if (!sec || isNaN(sec)) return "00:00";
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // ================= 基础模块 =================
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('clock-date').innerText = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        let textToType = "正在连接异世界的数据节点...";
        let typeIndex = 0;
        const typedElement = document.getElementById('typed-text');
        function typeWriter() {
            if (typeIndex < textToType.length) {
                typedElement.innerHTML += textToType.charAt(typeIndex);
                typeIndex++; setTimeout(typeWriter, 80);
            }
        }
        typeWriter();

        printLog('系统初始化', '正在拉取动漫一言...');
        fetch('https://v1.hitokoto.cn/?c=a&c=b')
            .then(res => res.json())
            .then(data => {
                typedElement.innerHTML = ""; textToType = `${data.hitokoto} — ⌈${data.from}⌋`;
                typeIndex = 0; typeWriter();
            }).catch(() => {
                typedElement.innerHTML = ""; textToType = "心之所向，素履以往。";
                typeIndex = 0; typeWriter();
            });

        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function openApp(type, id) {
            if (type === 'qq') {
                showToast('正在尝试唤起 QQ...');
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry/i.test(navigator.userAgent);
                setTimeout(() => window.location.href = isMobile ? `mqqwpa://im/chat?chat_type=wpa&uin=${id}&version=1&src_type=web` : `tencent://message/?uin=${id}&Site=Website&Menu=yes`, 500);
            } else if (type === 'wechat') {
                const input = document.createElement('input'); input.value = id; document.body.appendChild(input);
                input.select(); document.execCommand('copy'); document.body.removeChild(input);
                showToast('微信号已复制，正在唤起微信...');
                setTimeout(() => window.location.href = 'weixin://', 800);
            }
        }

        // ================= 播放器引擎 =================
        const audio = new Audio();
        let currentPlaylist = [];
        let currentIndex = -1;

        const uiVinyl = document.getElementById('vinyl-record');
        const uiCover = document.getElementById('player-cover');
        const uiTitle = document.getElementById('player-title');
        const uiArtist = document.getElementById('player-artist');
        const uiSourceTag = document.getElementById('player-source-tag');
        const uiPlayIcon = document.getElementById('play-pause-icon');
        const uiProgressFill = document.getElementById('progress-fill');
        const uiProgressContainer = document.getElementById('progress-container');

        audio.addEventListener('play', () => { uiPlayIcon.className = 'fas fa-pause'; uiVinyl.classList.add('playing'); });
        audio.addEventListener('pause', () => { uiPlayIcon.className = 'fas fa-play'; uiVinyl.classList.remove('playing'); });
        let currentLyrics = []; // [{time: seconds, text: string}]
        let lyricLineElements = [];

        audio.addEventListener('timeupdate', () => {
            if(audio.duration){ const percent = (audio.currentTime / audio.duration) * 100; uiProgressFill.style.width = percent + '%'; }
            updateLyricSync();
        });
        audio.addEventListener('ended', () => { playNext(); });

        // 原生音频解码错误拦截（核心：判断网易云VIP导致返回HTML而不能播放）
        audio.addEventListener('error', () => {
            const song = currentPlaylist[currentIndex];
            if(song && song.source === '网易云') {
                const msg = `《${song.name}》为 VIP 或无版权歌曲，自动跳过`;
                printLog('播放器拦截', '网易云版权/VIP拦截，已自动跳过。错误码: ' + (audio.error ? audio.error.code : '未知'), true);
                showToast(msg);
                
                // 在列表中打上 VIP 标签
                const activeItem = document.querySelector('.music-item.active .music-name');
                if(activeItem && !activeItem.innerHTML.includes('VIP')) {
                    activeItem.innerHTML += ' <span style="color:#ff4757; font-size:0.7rem; margin-left:5px; border:1px solid #ff4757; padding:0 3px; border-radius:3px;">VIP</span>';
                }
                song.isVip = true; // 标记VIP防止循环重复播

                // 2秒后自动切下一首
                setTimeout(() => playNext(), 2000);
            } else {
                showToast('播放失败，音频地址可能已失效');
                uiPlayIcon.className = 'fas fa-play';
                uiVinyl.classList.remove('playing');
            }
        });

        function togglePlay() {
            if(currentIndex === -1) { showToast('请先在下方搜索并选择一首歌曲哦'); return; }
            if(audio.paused) audio.play(); else audio.pause();
        }

        function playPrev() {
            if(currentPlaylist.length === 0) return;
            let nextIdx = currentIndex - 1;
            if(nextIdx < 0) nextIdx = currentPlaylist.length - 1; 
            playSongByIndex(nextIdx, true);
        }

        function playNext() {
            if(currentPlaylist.length === 0) return;
            let nextIdx = currentIndex + 1;
            if(nextIdx >= currentPlaylist.length) nextIdx = 0; 
            playSongByIndex(nextIdx, true);
        }

        function seekAudio(e) {
            if(!audio.duration) return;
            const rect = uiProgressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = clickX / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function playSongByIndex(index, isAutoSkip = false) {
            if(index < 0 || index >= currentPlaylist.length) return;
            const song = currentPlaylist[index];

            if(song.isVip) {
                if(!isAutoSkip) showToast('该歌曲为 VIP 专属版权，无法直接播放哦');
                else playNext(); 
                return;
            }
            if(!song.url) { showToast('获取播放链接失败'); return; }

            currentIndex = index;
            uiTitle.innerText = song.name; uiArtist.innerText = song.artist; uiSourceTag.innerText = song.source;
            uiCover.src = song.cover || 'https://via.placeholder.com/640x640/333/ffffff?text=Cover';
            
            document.querySelectorAll('.music-item').forEach((el, i) => {
                if(i === index) el.classList.add('active'); else el.classList.remove('active');
            });

            audio.src = song.url;

            // 加载歌词
            loadLyricsForSong(song);
            
            // 捕获播放 Promise 异常（针对浏览器媒体自动播放限制或 src 不支持抛出的异常）
            audio.play().catch(e => { 
                printLog('播放被阻止或异常', e.message || e, true);
                if(e.name === 'NotSupportedError' && song.source === '网易云') {
                    showToast(`《${song.name}》为 VIP 专属，自动跳过`);
                    song.isVip = true;
                    setTimeout(() => playNext(), 2000);
                }
            });
        }

        const musicListDiv = document.getElementById('musicListArea');

        function renderMusicList(songs, sourceType) {
            currentPlaylist = songs; currentIndex = -1; 
            if(!songs || songs.length === 0){ 
                musicListDiv.innerHTML = '<div class="status-msg"><i class="fas fa-box-open"></i> 未找到歌曲，换个关键词吧</div>'; 
                return; 
            }
            musicListDiv.innerHTML = '';
            songs.forEach((song, idx) => {
                const div = document.createElement('div'); div.className = 'music-item';
                const vipTag = song.isVip ? '<span style="color:#ff4757; font-size:0.7rem; margin-left:5px; border:1px solid #ff4757; padding:0 3px; border-radius:3px;">VIP</span>' : '';
                div.innerHTML = `
                    <div class="play-icon"><i class="fas fa-play"></i></div>
                    <div class="music-info">
                        <div class="music-name">${escapeHtml(song.name)} ${vipTag}</div>
                        <div class="music-artist">${escapeHtml(song.artist)}</div>
                    </div>
                    <div class="music-duration">${song.duration || '00:00'}</div>
                    <div class="source-tag">${sourceType}</div>
                `;
                div.onclick = () => playSongByIndex(idx);
                musicListDiv.appendChild(div);
            });
        }

        // ================= 歌词系统 =================
        function toggleLyricPanel() {
            const panel = document.getElementById('lyric-panel');
            const btn = document.getElementById('lyric-trigger-btn');
            panel.classList.toggle('show');
            btn.classList.toggle('active');
        }

        function parseLRC(lrcText) {
            if(!lrcText) return [];
            const lines = lrcText.split('\n');
            const result = [];
            for(const line of lines) {
                const matches = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/g);
                if(matches) {
                    let text = line;
                    for(const m of matches) text = text.replace(m, '');
                    text = text.trim();
                    if(!text) continue;
                    for(const m of matches) {
                        const t = m.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                        const sec = parseInt(t[1])*60 + parseInt(t[2]) + parseInt(t[3].padEnd(3,'0'))/1000;
                        result.push({time: sec, text: text});
                    }
                }
            }
            result.sort((a,b) => a.time - b.time);
            return result;
        }

        async function fetchNeteaseLyric(songId) {
            const targetUrl = `https://music.163.com/api/song/lyric?os=pc&id=${songId}&kv=-1&tv=-1`;
            const proxyUrl = `https://cros.xiongdaa.me/?url=${encodeURIComponent(targetUrl)}`;
            printLog('获取网易云歌词', proxyUrl);
            try {
                const resp = await fetch(proxyUrl);
                printLog('网易云歌词响应状态', `HTTP ${resp.status}`);
                const data = await resp.json();
                printLog('网易云歌词响应', data);
                let lrc = '';
                if(data.lrc && data.lrc.lyric) lrc = data.lrc.lyric;
                else if(data.tlyric && data.tlyric.lyric) lrc = data.tlyric.lyric;
                return lrc;
            } catch(e) {
                printLog('网易云歌词获取失败', {name: e.name, message: e.message}, true);
                return '';
            }
        }

        function renderLyrics(lyrics) {
            const container = document.getElementById('lyric-content');
            currentLyrics = lyrics;
            lyricLineElements = [];
            if(!lyrics || lyrics.length === 0) {
                container.innerHTML = '<div class="lyric-empty"><i class="fas fa-file-alt"></i> 暂无歌词</div>';
                return;
            }
            container.innerHTML = '';
            lyrics.forEach((lyric, idx) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.textContent = lyric.text;
                div.onclick = () => { if(audio.src) audio.currentTime = lyric.time; };
                container.appendChild(div);
                lyricLineElements.push(div);
            });
        }

        function updateLyricSync() {
            if(!currentLyrics.length) return;
            const t = audio.currentTime;
            let activeIdx = -1;
            for(let i = currentLyrics.length - 1; i >= 0; i--) {
                if(t >= currentLyrics[i].time) { activeIdx = i; break; }
            }
            lyricLineElements.forEach((el, i) => {
                el.classList.remove('active', 'past');
                if(i === activeIdx) el.classList.add('active');
                else if(i < activeIdx) el.classList.add('past');
            });
            if(activeIdx >= 0 && lyricLineElements[activeIdx]) {
                lyricLineElements[activeIdx].scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        }

        async function loadLyricsForSong(song) {
            document.getElementById('lyric-source-info').textContent = '';
            if(song.lyrics) {
                const parsed = parseLRC(song.lyrics);
                renderLyrics(parsed);
                document.getElementById('lyric-source-info').textContent = '已加载';
            } else if(song.source === '网易云' && song.songId) {
                renderLyrics([]);
                document.getElementById('lyric-source-info').textContent = '加载中...';
                const lrc = await fetchNeteaseLyric(song.songId);
                if(lrc) {
                    song.lyrics = lrc;
                    const parsed = parseLRC(lrc);
                    renderLyrics(parsed);
                    document.getElementById('lyric-source-info').textContent = '已加载';
                } else {
                    document.getElementById('lyric-source-info').textContent = '获取失败';
                }
            } else {
                renderLyrics([]);
            }
        }

        // ================= API 对接（彻底抛弃容易跨域且缓慢的直链请求） =================
        const CYAPI_KEY = '62ccfd8be755cc5850046044c6348d6cac5ef31bd5874c1352287facc06f94c4';
        
        async function searchQQMusic(keyword){
            const url = `https://cyapi.top/API/qq_music.php?apikey=${CYAPI_KEY}&msg=${encodeURIComponent(keyword)}&num=20&type=json&n=1`;
            printLog('发起 QQ音乐 搜索', url);
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                printLog('QQ音乐 响应成功', data);

                let items = [];
                if (data.name && data.url) items = [data]; 
                else if (data.data && data.data.list) items = data.data.list;

                return items.map(item => {
                    let coverUrl = null;
                    if (item.cover) coverUrl = item.cover.large || item.cover.medium || item.cover.small;
                    else coverUrl = item.picture || item.pic;
                    
                    let durationSec = item.duration || 0;

                    return {
                        name: item.name || '未知',
                        artist: (item.artists && item.artists[0]) ? item.artists[0].name : 'QQ音乐',
                        url: item.url || null,
                        cover: coverUrl,
                        duration: formatTime(durationSec),
                        source: 'QQ音乐',
                        isVip: false,
                        lyrics: (item.lyric && item.lyric.text) ? item.lyric.text : null
                    };
                }).filter(s => s.url);
            } catch(e){ 
                printLog('QQ音乐 请求报错', e.message || e, true); return []; 
            }
        }

        async function searchNetease(keyword){
            const url = `https://v2.alapi.cn/api/music/search?keyword=${encodeURIComponent(keyword)}&limit=15&type=1&token=LwExDtUWhF3rH5ib`;
            printLog('发起 网易云音乐 搜索', url);
            try{
                const resp = await fetch(url);
                const json = await resp.json();
                printLog('网易云 响应成功', json);

                if(json && json.data && json.data.songs){
                    const songsRaw = json.data.songs;
                    const songsWithUrl = [];
                    // 核心修复：直接使用网易云的标准外链拼接，不要再用fetch请求，彻底杜绝 CORS 和速度慢的问题！
                    for(let s of songsRaw){
                        const directUrl = `https://music.163.com/song/media/outer/url?id=${s.id}.mp3`;
                        const coverUrl = s.al?.picUrl || s.album?.picUrl || s.artists?.[0]?.img1v1Url || null;
                        const durationSec = Math.floor((s.duration || 0) / 1000);

                        songsWithUrl.push({
                            name: s.name, 
                            artist: s.artists?.[0]?.name || '网易云',
                            url: directUrl, 
                            cover: coverUrl, 
                            duration: formatTime(durationSec),
                            source: '网易云', 
                            isVip: false,
                            songId: s.id
                        });
                    }
                    return songsWithUrl;
                }
                return [];
            }catch(e){ 
                printLog('网易云 请求报错', e.message || e, true); return []; 
            }
        }

        // 网易云搜索带歌词预加载
        async function searchNeteaseWithLyrics(keyword) {
            const songs = await searchNetease(keyword);
            if(songs.length > 0) {
                setTimeout(async () => {
                    for(const song of songs) {
                        if(song.songId && !song.lyrics) {
                            try {
                                const lrc = await fetchNeteaseLyric(song.songId);
                                if(lrc) song.lyrics = lrc;
                            } catch(e) {}
                        }
                    }
                }, 500);
            }
            return songs;
        }

        // 解析JS变量格式的响应数据
        function parseJsVars(text) {
            try {
                // 直接用new Function执行JS代码，自动解析所有变量
                // 包括嵌套对象，比正则更可靠
                const code = text + `
                    return {
                        dataSK: typeof dataSK !== 'undefined' ? dataSK : null,
                        fc: typeof fc !== 'undefined' ? fc : null,
                        cityDZ: typeof cityDZ !== 'undefined' ? cityDZ : null,
                        dataZS: typeof dataZS !== 'undefined' ? dataZS : null,
                        alarmDZ: typeof alarmDZ !== 'undefined' ? alarmDZ : null,
                        id: typeof id !== 'undefined' ? id : null,
                        addr: typeof addr !== 'undefined' ? addr : null,
                        ip: typeof ip !== 'undefined' ? ip : null
                    };
                `;
                const fn = new Function(code);
                return fn();
            } catch(e) {
                printLog('JS变量解析失败', e.message, true);
                return {};
            }
        }

        async function loadWeather() {
            const widget = document.getElementById('weather-widget');
            
            try {
                // 第一步：获取本机IP
                const ipUrl = 'https://v.api.aa1.cn/api/myip/index.php?aa1=text';
                const ipResp = await fetch(ipUrl);
                const ipText = await ipResp.text();
                printLog('IP获取响应', ipText);
                const queryIp = ipText.trim();

                // 第二步：根据IP获取城市信息
                const cityUrl = `https://zj.v.api.aa1.cn/api/ip-taobao/?ip=${queryIp}`;
                const cityResp = await fetch(cityUrl);
                const cityData = await cityResp.json();
                printLog('城市信息响应', cityData);
                
                if(cityData.code !== '0' || !cityData.data) {
                    throw new Error('获取城市信息失败: ' + JSON.stringify(cityData));
                }
                
                // 解析最小的城市中文名
                const cityName = cityData.data.CITY_CN || '北京';
                printLog('解析城市名', cityName);

                // 第三步：获取天气数据
                const weatherUrl = `https://api.xunjinlu.fun/api/weather/v2.php?city=${encodeURIComponent(cityName)}`;
                const weatherProxyUrl = `https://cros.xiongdaa.me/?url=${encodeURIComponent(weatherUrl)}`;
                const weatherResp = await fetch(weatherProxyUrl);
                const weatherData = await weatherResp.json();
                printLog('天气数据响应', weatherData);

                if(weatherData.code !== 200 || !weatherData.data) {
                    throw new Error('获取天气数据失败: ' + JSON.stringify(weatherData));
                }

                const data = weatherData.data;
                const current = data.current;
                const todayForecast = data.forecast && data.forecast[0] ? data.forecast[0] : null;

                // 构建天气显示
                const temp = current.temperature || '25';
                const desc = todayForecast ? todayForecast.type : current.quality || '未知';
                const tempRange = todayForecast ? ` / 高温${todayForecast.high.replace('高温 ', '')} 低温${todayForecast.low.replace('低温 ', '')}` : '';
                const cityNameDisplay = data.city_info ? data.city_info.city : cityName;
                const updateInfo = data.update_time ? ` 更新于${data.update_time.split(' ')[1]}` : '';

                // 天气图标映射
                const weatherIconMap = {
                    '晴': 'fa-sun', '多云': 'fa-cloud-sun', '阴': 'fa-cloud',
                    '小雨': 'fa-cloud-showers-heavy', '中雨': 'fa-umbrella', '大雨': 'fa-umbrella',
                    '暴雨': 'fa-umbrella', '雪': 'fa-snowflake', '雾': 'fa-smog', '霾': 'fa-smog'
                };
                let iconClass = 'fa-cloud';
                for(const [key, icon] of Object.entries(weatherIconMap)) {
                    if(desc.includes(key)) {
                        iconClass = icon;
                        break;
                    }
                }

                widget.innerHTML = `
                    <div class="weather-icon"><i class="fas ${iconClass}"></i></div>
                    <div class="weather-info">
                        <div class="weather-temp">${temp}°C${tempRange}</div>
                        <div class="weather-desc">${desc}${updateInfo}</div>
                        <div class="weather-city"><i class="fas fa-map-marker-alt"></i> ${cityNameDisplay}</div>
                    </div>
                `;
            } catch(e) {
                printLog('天气获取失败', e.message, true);
                widget.innerHTML = '<div class="weather-loading"><i class="fas fa-cloud"></i> 天气加载失败</div>';
            }
        }
        loadWeather();

        // ================= 音乐律动效果 =================
        let audioContext = null;
        let analyser = null;
        let sourceNode = null;
        let dataArray = null;
        let animationId = null;
        let pulseEnabled = true;

        function initAudioContext() {
            if(audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                sourceNode = audioContext.createMediaElementSource(audio);
                sourceNode.connect(analyser);
                analyser.connect(audioContext.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                printLog('音频上下文', 'Web Audio API 初始化成功');
            } catch(e) {
                printLog('音频上下文初始化失败', e.message, true);
                pulseEnabled = false;
            }
        }

        function updateMusicPulse() {
            if(!pulseEnabled || !analyser || audio.paused) {
                animationId = requestAnimationFrame(updateMusicPulse);
                return;
            }

            analyser.getByteFrequencyData(dataArray);
            
            // 计算低频段平均值（贝斯/鼓点）
            let bassSum = 0;
            const bassRange = Math.floor(dataArray.length * 0.15);
            for(let i = 0; i < bassRange; i++) {
                bassSum += dataArray[i];
            }
            const bassAvg = bassSum / bassRange;
            const bassIntensity = bassAvg / 255; // 0-1

            // 计算整体音量
            let totalSum = 0;
            for(let i = 0; i < dataArray.length; i++) {
                totalSum += dataArray[i];
            }
            const totalAvg = totalSum / dataArray.length;
            const totalIntensity = totalAvg / 255;

            // 应用律动效果到遮罩层
            const overlay = document.querySelector('.overlay');
            const brightness = 0.2 + totalIntensity * 0.15;
            const blur = 20 + bassIntensity * 10;
            overlay.style.background = `radial-gradient(circle at center, rgba(0,0,0,${0.1 + bassIntensity * 0.2}) 0%, rgba(0,0,0,${0.5 + totalIntensity * 0.2}) 100%)`;

            // 应用律动效果到玻璃卡片
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach((card, idx) => {
                const scale = 1 + bassIntensity * 0.005 * (idx + 1);
                const glow = bassIntensity * 30;
                card.style.transform = `scale(${scale})`;
                card.style.boxShadow = `0 15px 35px rgba(0, 0, 0, 0.3), 0 0 ${glow}px rgba(165, 180, 252, ${bassIntensity * 0.3})`;
            });

            // 黑胶唱片转速随音乐变化
            if(uiVinyl.classList.contains('playing')) {
                const speed = 5 - totalIntensity * 2;
                uiVinyl.style.animationDuration = `${speed}s`;
            }

            animationId = requestAnimationFrame(updateMusicPulse);
        }

        // 播放时初始化音频上下文并启动律动
        audio.addEventListener('play', () => {
            document.body.classList.add('music-pulse');
            initAudioContext();
            if(audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            if(!animationId) {
                animationId = requestAnimationFrame(updateMusicPulse);
            }
        });

        audio.addEventListener('pause', () => {
            // 暂停时重置效果
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.style.transform = '';
                card.style.boxShadow = '';
            });
            const overlay = document.querySelector('.overlay');
            overlay.style.background = '';
            uiVinyl.style.animationDuration = '';
        });

        // ================= 点击特效 =================
        let clickEffectIndex = 0;
        const clickEffects = ['ripple', 'heart', 'particle'];

        function createClickEffect(e) {
            const x = e.clientX;
            const y = e.clientY;

            // 波纹效果
            const ripple = document.createElement('div');
            ripple.className = 'click-effect';
            ripple.style.left = (x - 50) + 'px';
            ripple.style.top = (y - 50) + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);

            // 随机爱心效果
            if(Math.random() > 0.6) {
                const heart = document.createElement('div');
                heart.className = 'click-heart';
                heart.innerHTML = '<i class="fas fa-heart"></i>';
                heart.style.left = (x - 10) + 'px';
                heart.style.top = (y - 10) + 'px';
                // 随机偏移
                const offsetX = (Math.random() - 0.5) * 40;
                heart.style.setProperty('--tx', offsetX + 'px');
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1200);
            }

            // 粒子爆炸效果
            const particleCount = 6 + Math.floor(Math.random() * 6);
            for(let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'click-particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                const angle = (Math.PI * 2 / particleCount) * i + Math.random() * 0.5;
                const distance = 30 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                // 随机颜色
                const colors = ['#a5b4fc', '#f472b6', '#60a5fa', '#34d399', '#fbbf24'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        document.addEventListener('click', createClickEffect);

        // 移动端触摸支持
        document.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            createClickEffect({ clientX: touch.clientX, clientY: touch.clientY });
        }, { passive: true });
    </script>
