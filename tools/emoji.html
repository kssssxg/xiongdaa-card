<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>йўңж–Үеӯ—еӨ§е…Ё - xiong da</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .emoji-container {
            padding: 24px 30px 30px;
            width: 100%;
            max-width: 820px;
            position: relative;
            z-index: 10;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .emoji-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .emoji-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .emoji-header .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .emoji-header-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 14px;
        }
        .emoji-header-actions .action-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .emoji-header-actions .action-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-color: var(--theme-accent);
        }
        .emoji-header-actions .action-btn.active {
            color: #fbbf24;
            border-color: #fbbf24;
        }

        .search-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
            pointer-events: none;
            transition: color 0.3s;
            z-index: 1;
        }
        .search-wrap input {
            width: 100%;
            padding: 12px 36px 12px 40px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.88rem;
            outline: none;
            transition: all 0.3s;
        }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
        .search-wrap input:focus {
            border-color: var(--theme-accent);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 3px rgba(165,180,252,0.12);
        }
        .search-wrap input:focus ~ i { color: var(--theme-accent); }
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            background: none;
            border: none;
            padding: 4px 6px;
            z-index: 1;
        }
        .search-clear.visible { opacity: 1; }
        .search-clear:hover { color: #fff; }

        .emoji-stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .emoji-stats .stat-item {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .emoji-stats .stat-item i { color: var(--theme-accent); font-size: 0.7rem; }

        .section {
            margin-top: 26px;
        }
        .section:first-of-type { margin-top: 0; }
        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 7px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            letter-spacing: 0.3px;
        }
        .section-title i { color: var(--theme-accent); font-size: 0.85rem; width: 18px; text-align: center; }
        .section-title .count { margin-left: auto; font-size: 0.65rem; font-weight: 400; color: rgba(255,255,255,0.25); font-family: monospace; }

        .emoji-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .emoji-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.18s;
            user-select: none;
            white-space: nowrap;
            min-width: 56px;
        }
        .emoji-btn:hover {
            background: rgba(255,255,255,0.14);
            border-color: var(--theme-accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(165,180,252,0.15);
        }
        .emoji-btn:active {
            transform: scale(0.94);
        }
        .emoji-btn .fav-star {
            font-size: 0.55rem;
            margin-left: 6px;
            color: rgba(255,255,255,0.2);
            transition: color 0.2s;
        }
        .emoji-btn .fav-star.filled { color: #fbbf24; }
        .emoji-btn .copied-badge {
            font-size: 0.5rem;
            background: rgba(165,180,252,0.3);
            color: var(--theme-accent);
            padding: 1px 5px;
            border-radius: 4px;
            margin-left: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .emoji-btn .copied-badge.show { opacity: 1; }

        .recent-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 36px;
            align-items: center;
        }
        .recent-list .empty-hint {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.2);
            padding: 8px 0;
        }
        .recent-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .recent-item:hover {
            background: rgba(255,255,255,0.12);
            border-color: var(--theme-accent);
            color: #fff;
        }
        .recent-item .recent-emoji { font-size: 1rem; margin-right: 2px; }

        .no-match {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.25);
            font-size: 0.85rem;
        }
        .no-match i { font-size: 2rem; display: block; margin-bottom: 12px; }

        .cat-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
            justify-content: center;
        }
        .cat-tab {
            padding: 6px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            color: var(--text-muted);
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .cat-tab:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .cat-tab.active {
            background: rgba(165,180,252,0.2);
            border-color: var(--theme-accent);
            color: var(--theme-accent);
        }

        @media (max-width: 600px) {
            .emoji-container { padding: 18px 16px; border-radius: 18px; }
            .emoji-btn { padding: 10px 14px; font-size: 0.9rem; }
            .emoji-header h1 { font-size: 1.3rem; }
            .cat-tabs { gap: 4px; }
            .cat-tab { padding: 5px 10px; font-size: 0.72rem; }
        }

const LS_FAV = 'xiongda_emoji_fav';
const LS_RECENT = 'xiongda_emoji_recent';

function getFavorites() {
    try { return JSON.parse(localStorage.getItem(LS_FAV)) || []; } catch(e) { return []; }
}
function setFavorites(arr) {
    try { localStorage.setItem(LS_FAV, JSON.stringify(arr)); } catch(e) {}
}
function getRecent() {
    try { return JSON.parse(localStorage.getItem(LS_RECENT)) || []; } catch(e) { return []; }
}
function setRecent(arr) {
    try { localStorage.setItem(LS_RECENT, JSON.stringify(arr)); } catch(e) {}
}

function toggleFav(emojiStr) {
    const favs = getFavorites();
    const idx = favs.indexOf(emojiStr);
    if (idx > -1) {
        favs.splice(idx, 1);
        showToast('е·ІеҸ–ж¶Ҳж”¶и—Ҹ');
    } else {
        favs.unshift(emojiStr);
        showToast('вӯҗ е·Іж”¶и—Ҹ');
    }
    setFavorites(favs);
    render();
}

function addRecent(emojiStr) {
    let recents = getRecent();
    recents = recents.filter(r => r !== emojiStr);
    recents.unshift(emojiStr);
    if (recents.length > 30) recents = recents.slice(0, 30);
    setRecent(recents);
}

function isFav(emojiStr) {
    return getFavorites().indexOf(emojiStr) > -1;
}

// ======================== жёІжҹ“ ========================
let currentSearch = '';
let activeCat = '';

function getIconForCat(cat) {
    const m = {
        'ејҖеҝғ': 'fa-face-smile',
        'дјӨеҝғ': 'fa-face-sad-tear',
        'з”ҹж°”': 'fa-face-angry',
        'жғҠи®¶': 'fa-face-surprise',
        'е®ізҫһ': 'fa-face-flushed',
        'ж— еҘҲ': 'fa-face-meh',
        'еҸҜзҲұ': 'fa-face-kiss-wink-heart',
        'зҲұеҝғ': 'fa-heart',
        'еҠЁзү©': 'fa-paw',
        'йЈҹзү©': 'fa-utensils',
        'жүӢеҠҝ': 'fa-hand-peace',
        'з®ӯеӨҙ': 'fa-arrow-right',
        'зү№ж®Ҡз¬ҰеҸ·': 'fa-star'
    };
    return m[cat] || 'fa-smile';
}

function catOrder(cat) {
    const order = ['ејҖеҝғ','дјӨеҝғ','з”ҹж°”','жғҠи®¶','е®ізҫһ','ж— еҘҲ','еҸҜзҲұ','зҲұеҝғ','еҠЁзү©','йЈҹзү©','жүӢеҠҝ','з®ӯеӨҙ','зү№ж®Ҡз¬ҰеҸ·'];
    const idx = order.indexOf(cat);
    return idx >= 0 ? idx : 999;
}

function render() {
    const favs = getFavorites();
    const recents = getRecent();
    const search = currentSearch.trim().toLowerCase();
    const area = document.getElementById('contentArea');
    const statsTotal = document.getElementById('totalCount');
    const statsFav = document.getElementById('favCount');
    const statsRecent = document.getElementById('recentCount');

    statsTotal.textContent = emojiData.length;
    statsFav.textContent = favs.length;
    statsRecent.textContent = recents.length;

    // Filter data
    let filtered = emojiData;
    if (search) {
        filtered = filtered.filter(e =>
            e.desc.toLowerCase().includes(search) ||
            e.cat.includes(search) ||
            e.emoji.includes(search)
        );
    }

    // Group by category
    const groups = {};
    filtered.forEach(e => {
        if (!groups[e.cat]) groups[e.cat] = [];
        groups[e.cat].push(e);
    });

    // Tabs
    const catTabs = document.getElementById('catTabs');
    const cats = Object.keys(groups).sort((a,b) => catOrder(a) - catOrder(b));
    if (cats.length <= 1 && !activeCat) {
        catTabs.innerHTML = '';
    } else {
        let tabHTML = '<button class="cat-tab' + (!activeCat ? ' active' : '') + '" data-cat="">е…ЁйғЁ</button>';
        cats.forEach(c => {
            tabHTML += '<button class="cat-tab' + (activeCat === c ? ' active' : '') + '" data-cat="' + c + '"><i class="fas ' + getIconForCat(c) + '"></i> ' + c + '</button>';
        });
        catTabs.innerHTML = tabHTML;
        catTabs.querySelectorAll('.cat-tab').forEach(btn => {
            btn.addEventListener('click', function() {
                activeCat = this.dataset.cat;
                render();
            });
        });
    }

    // Build HTML
    let html = '';

    // -- Favorites section --
    if (!search && favs.length > 0) {
        const favItems = filtered.filter(e => favs.includes(e.emoji));
        if (favItems.length > 0) {
            html += '<div class="section" id="sec-fav"><div class="section-title"><i class="fas fa-star" style="color:#fbbf24"></i> ж”¶и—ҸеӨ№ <span class="count">' + favItems.length + '</span></div><div class="emoji-grid">';
            favItems.forEach(e => {
                html += buildBtn(e, true);
            });
            html += '</div></div>';
        }
    }

    // -- Recent section --
    if (!search && recents.length > 0) {
        const recentItems = recents.map(r => emojiData.find(e => e.emoji === r)).filter(Boolean);
        if (recentItems.length > 0) {
            html += '<div class="section" id="sec-recent"><div class="section-title"><i class="fas fa-history" style="color:#60a5fa"></i> жңҖиҝ‘дҪҝз”Ё <span class="count">' + recentItems.length + '</span></div><div class="recent-list">';
            recentItems.forEach(e => {
                html += '<span class="recent-item" data-emoji="' + escAttr(e.emoji) + '"><span class="recent-emoji">' + escHtml(e.emoji) + '</span> <span style="font-size:0.65rem;color:rgba(255,255,255,0.3)">' + escHtml(e.desc) + '</span></span>';
            });
            html += '</div></div>';
        }
    }

    // -- Category sections --
    let shownCats = cats;
    if (activeCat) shownCats = cats.filter(c => c === activeCat);
    if (shownCats.length === 0 && search) {
        html += '<div class="no-match"><i class="fas fa-face-frown"></i>жІЎжңүжүҫеҲ°еҢ№й…Қзҡ„йўңж–Үеӯ—<br><span style="font-size:0.75rem">иҜ•иҜ•е…¶д»–е…ій”®иҜҚ</span></div>';
    }
    shownCats.forEach(c => {
        const items = groups[c];
        if (activeCat && c !== activeCat) return;
        html += '<div class="section"><div class="section-title"><i class="fas ' + getIconForCat(c) + '"></i> ' + c + ' <span class="count">' + items.length + '</span></div><div class="emoji-grid">';
        items.forEach(e => {
            html += buildBtn(e);
        });
        html += '</div></div>';
    });

    area.innerHTML = html;

    // Bind events
    area.querySelectorAll('.emoji-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            const emojiStr = this.dataset.emoji;
            copyText(emojiStr);
            addRecent(emojiStr);
            // Flash copied badge
            const badge = this.querySelector('.copied-badge');
            if (badge) {
                badge.classList.add('show');
                setTimeout(() => badge.classList.remove('show'), 800);
            }
            // Update recent + fav counts after a tick
            setTimeout(render, 100);
        });
    });

    // Fav star click on button (stop propagation)
    area.querySelectorAll('.fav-star').forEach(star => {
        star.addEventListener('click', function(e) {
            e.stopPropagation();
            const btn = this.closest('.emoji-btn');
            const emojiStr = btn.dataset.emoji;
            toggleFav(emojiStr);
        });
    });

    // Recent item click
    area.querySelectorAll('.recent-item').forEach(item => {
        item.addEventListener('click', function() {
            const emojiStr = this.dataset.emoji;
            copyText(emojiStr);
            addRecent(emojiStr);
            setTimeout(render, 100);
        });
    });
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildBtn(e, forceFav) {
    const fav = forceFav || isFav(e.emoji);
    const starClass = fav ? 'fav-star filled' : 'fav-star';
    return '<button class="emoji-btn" data-emoji="' + escAttr(e.emoji) + '">'
        + escHtml(e.emoji)
        + ' <span class="' + starClass + '"><i class="fa' + (fav ? 's' : 'r') + '-star"></i></span>'
        + ' <span class="copied-badge">е·ІеӨҚеҲ¶</span>'
        + '</button>';
}

document.getElementById('searchInput').addEventListener('input', function() {
    currentSearch = this.value;
    activeCat = '';
    document.getElementById('searchClear').classList.toggle('visible', this.value.length > 0);
    render();
});

document.getElementById('searchClear').addEventListener('click', function() {
    const input = document.getElementById('searchInput');
    input.value = '';
    currentSearch = '';
    activeCat = '';
    this.classList.remove('visible');
    render();
    input.focus();
});

document.getElementById('clearRecentBtn').addEventListener('click', function() {
    if (getRecent().length === 0) { showToast('жңҖиҝ‘дҪҝз”Ёе·Ідёәз©ә'); return; }
    setRecent([]);
    showToast('е·Іжё…йҷӨжңҖиҝ‘дҪҝз”Ё');
    render();
});

document.getElementById('clearFavBtn').addEventListener('click', function() {
    if (getFavorites().length === 0) { showToast('ж”¶и—ҸеӨ№е·Ідёәз©ә'); return; }
    setFavorites([]);
    showToast('е·Іжё…йҷӨжүҖжңүж”¶и—Ҹ');
    render();
});

document.addEventListener('DOMContentLoaded', function() {
    render();
});
