<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日一句 · 励志名言</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* ========== 页面专用样式 ========== */
        .quote-wrapper {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .quote-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 45px 40px 35px;
            position: relative;
            transition: all 0.3s;
        }

        .quote-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
            letter-spacing: 2px;
        }
        .quote-title i {
            color: var(--theme-accent);
            margin-right: 8px;
        }
        .quote-subtitle {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* 搜索栏 */
        .search-box {
            position: relative;
            margin-bottom: 22px;
        }
        .search-box input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 10px 40px 10px 16px;
            border-radius: 12px;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: var(--theme-accent);
            background: rgba(255,255,255,0.12);
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.35);
        }
        .search-box i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .category-tab {
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            user-select: none;
        }
        .category-tab:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .category-tab.active {
            background: rgba(165,180,252,0.2);
            border-color: var(--theme-accent);
            color: var(--theme-accent);
        }

        /* 名言显示区 */
        .quote-display {
            position: relative;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            overflow: hidden;
        }

        .quote-text {
            font-size: 1.4rem;
            line-height: 1.8;
            text-align: center;
            font-weight: 400;
            color: var(--text-main);
            transition: opacity 0.35s ease, transform 0.35s ease;
            position: relative;
        }
        .quote-text .quote-mark {
            color: var(--theme-accent);
            opacity: 0.4;
            font-size: 2rem;
            line-height: 0;
            vertical-align: -0.35em;
        }
        .quote-text .quote-mark.end {
            vertical-align: -0.1em;
        }

        .quote-text.fade-out {
            opacity: 0;
            transform: translateY(-12px) scale(0.96);
        }
        .quote-text.fade-in {
            animation: quoteFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes quoteFadeIn {
            0% { opacity: 0; transform: translateY(16px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .quote-author {
            margin-top: 18px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--theme-accent);
            font-weight: 500;
            letter-spacing: 1px;
            transition: opacity 0.35s ease;
        }
        .quote-author::before {
            content: '—— ';
            color: var(--text-muted);
            font-weight: 300;
        }
        .quote-author.fade-out {
            opacity: 0;
        }
        .quote-author.fade-in {
            animation: quoteFadeIn 0.5s 0.08s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 操作按钮 */
        .quote-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 25px;
            padding-top: 22px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .quote-actions .tool-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            padding: 8px 18px;
        }
        .quote-actions .tool-btn i {
            font-size: 0.85rem;
        }
        .quote-actions .tool-btn.favorited {
            background: rgba(251, 191, 36, 0.15);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .quote-actions .tool-btn.favorited i {
            color: #fbbf24;
        }

        /* 收藏列表 */
        .favorites-section {
            margin-top: 28px;
        }
        .favorites-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .favorites-header h3 {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }
        .favorites-header h3 i {
            color: #fbbf24;
            margin-right: 6px;
        }
        .favorites-header span {
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .favorites-header .clear-favs {
            font-size: 0.78rem;
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .favorites-header .clear-favs:hover {
            color: #f87171;
        }

        .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.15) transparent;
        }
        .favorites-list::-webkit-scrollbar {
            width: 4px;
        }
        .favorites-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .favorites-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }

        .fav-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            transition: all 0.2s;
        }
        .fav-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .fav-item .fav-content {
            flex: 1;
            min-width: 0;
        }
        .fav-item .fav-text {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .fav-item .fav-author {
            font-size: 0.75rem;
            color: var(--theme-accent);
            margin-top: 4px;
        }
        .fav-item .fav-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .fav-item .fav-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .fav-item .fav-actions .fav-copy:hover {
            color: var(--theme-accent);
            background: rgba(165,180,252,0.1);
        }
        .fav-item .fav-actions .fav-remove:hover {
            color: #f87171;
            background: rgba(248,113,113,0.1);
        }

        .fav-empty {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .fav-empty i {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .quote-card {
                padding: 30px 20px 25px;
            }
            .quote-text {
                font-size: 1.15rem;
            }
            .quote-actions .tool-btn {
                font-size: 0.78rem;
                padding: 7px 14px;
            }
            .category-tabs {
                gap: 6px;
            }
            .category-tab {
                font-size: 0.75rem;
                padding: 5px 12px;
            }
        }

        /* 无结果提示 */
        .no-result {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .no-result i {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        /* 收藏通知徽标 */
        .fav-badge {
            display: none;
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: #fbbf24;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.5);
        }
        .fav-badge.show {
            display: block;
        }
    </style>
</head>

    <script>
    // ==================== 主逻辑 ====================

    (function() {
        'use strict';

        const STORAGE_KEY = 'xiongda_quote_favorites';
        let currentQuote = null;
        let currentCategory = 'all';
        let favoritedIds = new Set(); // 存 text 作为 id（唯一）

        // DOM 引用
        const quoteContent = document.getElementById('quoteContent');
        const quoteAuthor = document.getElementById('quoteAuthor');
        const quoteText = document.getElementById('quoteText');
        const btnNext = document.getElementById('btnNext');
        const btnCopy = document.getElementById('btnCopy');
        const btnFavorite = document.getElementById('btnFavorite');
        const favBadge = document.getElementById('favBadge');
        const searchInput = document.getElementById('searchInput');
        const categoryTabs = document.querySelectorAll('.category-tab');
        const favoritesList = document.getElementById('favoritesList');
        const favCount = document.getElementById('favCount');
        const clearFavs = document.getElementById('clearFavs');

        // ---------- 工具函数 ----------
        function getFilteredQuotes() {
            const query = searchInput.value.trim().toLowerCase();
            let list = QUOTES;

            // 分类过滤
            if (currentCategory !== 'all') {
                list = list.filter(q => q.category === currentCategory);
            }

            // 搜索过滤
            if (query) {
                list = list.filter(q =>
                    q.text.toLowerCase().includes(query) ||
                    q.author.toLowerCase().includes(query)
                );
            }

            return list;
        }

        function getRandomQuote() {
            const list = getFilteredQuotes();
            if (list.length === 0) return null;
            const idx = Math.floor(Math.random() * list.length);
            return { ...list[idx], _id: list[idx].text };
        }

        function loadFavorites() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveFavorites(favs) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(favs));
            } catch (e) {
                showToast('收藏保存失败，请检查存储空间');
            }
        }

        function isFavorited(text) {
            return favoritedIds.has(text);
        }

        function updateFavoriteBtn() {
            if (!currentQuote) return;
            const fav = isFavorited(currentQuote.text);
            const icon = btnFavorite.querySelector('i');
            if (fav) {
                icon.className = 'fas fa-star';
                btnFavorite.classList.add('favorited');
                btnFavorite.title = '取消收藏';
            } else {
                icon.className = 'far fa-star';
                btnFavorite.classList.remove('favorited');
                btnFavorite.title = '收藏名言';
            }
        }

        function updateFavBadge() {
            const count = favoritedIds.size;
            if (count > 0) {
                favBadge.classList.add('show');
            } else {
                favBadge.classList.remove('show');
            }
        }

        // ---------- 显示名言（带动画） ----------
        function displayQuote(quote, animate = true) {
            if (!quote) {
                quoteContent.innerText = '没有匹配的名言';
                quoteAuthor.innerText = '';
                currentQuote = null;
                updateFavoriteBtn();
                return;
            }

            if (animate) {
                // 淡出
                quoteText.classList.add('fade-out');
                quoteAuthor.classList.add('fade-out');

                setTimeout(() => {
                    quoteContent.innerText = quote.text;
                    quoteAuthor.innerText = quote.author;
                    currentQuote = quote;
                    updateFavoriteBtn();

                    // 淡入
                    quoteText.classList.remove('fade-out');
                    quoteAuthor.classList.remove('fade-out');
                    quoteText.classList.add('fade-in');
                    quoteAuthor.classList.add('fade-in');

                    setTimeout(() => {
                        quoteText.classList.remove('fade-in');
                        quoteAuthor.classList.remove('fade-in');
                    }, 600);
                }, 300);
            } else {
                quoteContent.innerText = quote.text;
                quoteAuthor.innerText = quote.author;
                currentQuote = quote;
                updateFavoriteBtn();
                quoteText.classList.add('fade-in');
                quoteAuthor.classList.add('fade-in');
                setTimeout(() => {
                    quoteText.classList.remove('fade-in');
                    quoteAuthor.classList.remove('fade-in');
                }, 600);
            }
        }

        function showNext() {
            const quote = getRandomQuote();
            if (!quote) {
                showToast('没有匹配的结果，试试其他分类或关键词');
                displayQuote(null, true);
                return;
            }
            displayQuote(quote, true);
        }

        // ---------- 渲染收藏列表 ----------
        function renderFavorites() {
            const favs = loadFavorites();
            favoritedIds = new Set(favs.map(f => f.text));
            updateFavoriteBtn();
            updateFavBadge();

            if (favs.length === 0) {
                favoritesList.innerHTML = `
                    <div class="fav-empty">
                        <i class="far fa-star"></i>
                        还没有收藏，点击 <strong>★ 收藏</strong> 按钮添加
                    </div>
                `;
                favCount.innerText = '0 条';
                return;
            }

            favCount.innerText = `${favs.length} 条`;
            let html = '';
            favs.forEach((f, index) => {
                html += `
                    <div class="fav-item" data-index="${index}">
                        <div class="fav-content">
                            <div class="fav-text">${f.text}</div>
                            <div class="fav-author">${f.author}</div>
                        </div>
                        <div class="fav-actions">
                            <button class="fav-copy" title="复制" data-text="${escapeHtml(f.text)} — ${escapeHtml(f.author)}"><i class="fas fa-copy"></i></button>
                            <button class="fav-remove" title="删除" data-text="${escapeHtml(f.text)}"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                `;
            });
            favoritesList.innerHTML = html;

            // 事件委托：复制 & 删除
            favoritesList.querySelectorAll('.fav-copy').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.getAttribute('data-text');
                    copyText(text);
                });
            });
            favoritesList.querySelectorAll('.fav-remove').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.getAttribute('data-text');
                    // 提取原始原文（去掉 — 作者部分）
                    const rawText = text.split(' — ')[0];
                    removeFavorite(rawText);
                });
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ---------- 收藏操作 ----------
        function toggleFavorite() {
            if (!currentQuote) {
                showToast('没有名言可收藏');
                return;
            }
            const text = currentQuote.text;
            let favs = loadFavorites();

            if (isFavorited(text)) {
                // 取消收藏
                favs = favs.filter(f => f.text !== text);
                saveFavorites(favs);
                showToast('已取消收藏');
            } else {
                // 收藏
                favs.push({ text: currentQuote.text, author: currentQuote.author, category: currentQuote.category });
                saveFavorites(favs);
                showToast('已收藏 ❤️');
            }

            renderFavorites();
        }

        function removeFavorite(text) {
            let favs = loadFavorites();
            favs = favs.filter(f => f.text !== text);
            saveFavorites(favs);
            renderFavorites();
            showToast('已移除收藏');
        }

        function clearAllFavorites() {
            const favs = loadFavorites();
            if (favs.length === 0) {
                showToast('收藏夹已空');
                return;
            }
            if (confirm('确定清空所有收藏吗？')) {
                saveFavorites([]);
                renderFavorites();
                showToast('已清空收藏夹');
            }
        }

        // ---------- 复制 ----------
        function copyQuote() {
            if (!currentQuote) {
                showToast('没有名言可复制');
                return;
            }
            const text = `"${currentQuote.text}" —— ${currentQuote.author}`;
            copyText(text);
        }

        // ---------- 分类切换 ----------
        function setCategory(cat) {
            currentCategory = cat;
            categoryTabs.forEach(tab => {
                tab.classList.toggle('active', tab.getAttribute('data-cat') === cat);
            });
            showNext();
        }

        // ---------- 搜索 ----------
        let searchTimer = null;
        function onSearchInput() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                showNext();
            }, 350);
        }

        // ---------- 初始化 ----------
        function init() {
            // 读取收藏
            renderFavorites();

            // 首次显示随机名言
            const first = getRandomQuote();
            displayQuote(first || QUOTES[Math.floor(Math.random() * QUOTES.length)], false);

            // 事件绑定
            btnNext.addEventListener('click', showNext);
            btnCopy.addEventListener('click', copyQuote);
            btnFavorite.addEventListener('click', toggleFavorite);
            clearFavs.addEventListener('click', clearAllFavorites);

            categoryTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    setCategory(this.getAttribute('data-cat'));
                });
            });

            searchInput.addEventListener('input', onSearchInput);

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    showNext();
                }
            });
        }

        // 等待 DOM 加载
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
    </script>

</body>
</html>
