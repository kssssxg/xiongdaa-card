<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>历史上的今天 - xiong da</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* ---- 历史上的今天 特有样式 ---- */
        .today-container {
            padding: 0 4px;
        }

        /* 日期选择区 */
        .date-picker {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .date-picker select {
            padding: 10px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.3s;
            min-width: 110px;
        }
        .date-picker select:focus { border-color: var(--theme-accent); }
        .date-picker select option { background: #2a2a35; color: #fff; }
        .date-picker .today-btn {
            padding: 10px 20px;
            background: rgba(165,180,252,0.15);
            border: 1px solid var(--theme-accent);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .date-picker .today-btn:hover { background: rgba(165,180,252,0.3); }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .category-tabs .cat-btn {
            padding: 6px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .category-tabs .cat-btn:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .category-tabs .cat-btn.active {
            background: rgba(165,180,252,0.2);
            border-color: var(--theme-accent);
            color: #fff;
        }
        .category-tabs .cat-btn .cat-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* 统计栏 */
        .today-stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 0.78rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .today-stats span { display: flex; align-items: center; gap: 4px; }
        .today-stats .stat-num { color: var(--theme-accent); font-weight: 600; }

        /* 事件列表 */
        .event-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .event-list .event-empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .event-list .event-empty i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* 单个事件卡片 */
        .event-item {
            display: flex;
            gap: 14px;
            padding: 16px 18px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            transition: all 0.25s;
            position: relative;
        }
        .event-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
        }
        .event-item .event-year {
            flex-shrink: 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--theme-accent);
            min-width: 60px;
            line-height: 1.3;
        }
        .event-item .event-body {
            flex: 1;
            min-width: 0;
        }
        .event-item .event-desc {
            font-size: 0.92rem;
            line-height: 1.6;
            word-break: break-word;
            margin-bottom: 6px;
        }
        .event-item .event-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .event-item .event-tag {
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 500;
        }
        .tag-politics { background: rgba(248,113,113,0.2); color: #f87171; }
        .tag-tech     { background: rgba(96,165,250,0.2); color: #60a5fa; }
        .tag-culture  { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .tag-sports   { background: rgba(52,211,153,0.2); color: #34d399; }
        .tag-disaster { background: rgba(168,85,247,0.2); color: #a855f7; }

        .event-item .event-actions {
            flex-shrink: 0;
            display: flex;
            gap: 6px;
            align-items: flex-start;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .event-item:hover .event-actions { opacity: 1; }
        .event-actions .act-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .event-actions .act-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .event-actions .act-btn.fav-btn:hover { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .event-actions .act-btn.fav-btn.active { color: #fbbf24; background: rgba(251,191,36,0.15); }
        .event-actions .act-btn.copy-btn:hover { background: rgba(96,165,250,0.2); color: #60a5fa; }

        /* 收藏夹面板 */
        .fav-toggle-wrap {
            text-align: center;
            margin-bottom: 16px;
        }
        .fav-toggle-wrap button {
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.2);
            color: rgba(251,191,36,0.7);
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.25s;
        }
        .fav-toggle-wrap button:hover {
            background: rgba(251,191,36,0.2);
            color: #fbbf24;
        }
        .fav-toggle-wrap button.active {
            background: rgba(251,191,36,0.2);
            color: #fbbf24;
            border-color: #fbbf24;
        }

        /* 收藏夹面板 */
        .fav-panel {
            display: none;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 18px;
        }
        .fav-panel.show { display: block; }
        .fav-panel h3 {
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fav-panel .fav-list { list-style: none; padding: 0; margin: 0; }
        .fav-panel .fav-item {
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04);
            font-size: 0.82rem;
            align-items: center;
        }
        .fav-panel .fav-item .fav-date {
            flex-shrink: 0;
            color: var(--theme-accent);
            font-weight: 600;
            font-size: 0.75rem;
            min-width: 50px;
        }
        .fav-panel .fav-item .fav-text {
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }
        .fav-panel .fav-item .fav-del {
            flex-shrink: 0;
            background: none;
            border: none;
            color: rgba(248,113,113,0.5);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px;
            transition: color 0.2s;
        }
        .fav-panel .fav-item .fav-del:hover { color: #f87171; }
        .fav-panel .fav-empty {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        @media (max-width: 600px) {
            .event-item .event-year { font-size: 1.1rem; min-width: 45px; }
            .event-item { padding: 12px 14px; }
            .event-actions { opacity: 1; }
            .event-actions .act-btn { width: 36px; height: 36px; font-size: 0.85rem; }
            .date-picker select { min-width: 90px; padding: 8px 12px; font-size: 0.85rem; }
        }
    </style>
</head>

                <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>

            </select>

        </div>

        <!-- 分类标签 -->
        <div class="category-tabs" id="categoryTabs">
            <button class="cat-btn active" data-cat="all" onclick="setCategory('all')">全部</button>
            <button class="cat-btn" data-cat="politics" onclick="setCategory('politics')"><span class="cat-dot" style="background:#f87171;"></span>政治</button>
            <button class="cat-btn" data-cat="tech" onclick="setCategory('tech')"><span class="cat-dot" style="background:#60a5fa;"></span>科技</button>

            <button class="cat-btn" data-cat="disaster" onclick="setCategory('disaster')"><span class="cat-dot" style="background:#a855f7;"></span>灾难</button>
        </div>

        <!-- 统计栏 -->
        <div class="today-stats" id="todayStats">
            <span>📅 <span id="displayDate">--</span></span>
            <span>事件 <span class="stat-num" id="statTotal">0</span></span>
            <span>筛选后 <span class="stat-num" id="statFiltered">0</span></span>
        </div>

        <!-- 收藏夹切换 -->
        <div class="fav-toggle-wrap">
            <button id="favToggleBtn" onclick="toggleFavPanel()"><i class="fas fa-star"></i> 我的收藏 (<span id="favCount">0</span>)</button>
        </div>

        <!-- 收藏夹面板 -->
        <div class="fav-panel" id="favPanel">
            <h3><i class="fas fa-star"></i> 收藏的事件</h3>
            <div class="fav-list" id="favList">
                <div class="fav-empty"><i class="fas fa-star" style="display:block;font-size:1.5rem;margin-bottom:8px;opacity:0.4;"></i>暂无收藏</div>
            </div>
        </div>
        </div>
